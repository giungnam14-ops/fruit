<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 과일 분류기 | 실시간 및 사진 분석 서비스</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="AI 기술을 활용한 실시간 과일 분류 서비스입니다. 웹캠이나 사진 업로드를 통해 과일의 종류를 즉시 판별하세요.">
    <meta name="keywords" content="과일 분류, AI, 머신러닝, Teachable Machine, 과일 판별, 실시간 분석">
    
    <!-- Open Graph for Social Media -->
    <meta property="og:title" content="AI 과일 분류기">
    <meta property="og:description" content="웹캠과 사진으로 과일을 스마트하게 분류해보세요!">
    <meta property="og:type" content="website">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ecca3;
            --secondary: #3498db;
            --danger: #ff4757;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-fruits {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-fruit {
            position: absolute;
            font-size: 2rem;
            filter: blur(2px);
            opacity: 0.2;
            animation: float 20s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        header {
            margin: 40px 0 20px;
            text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #4ecca3, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .subtitle {
            font-weight: 300;
            opacity: 0.7;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        main {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            padding: 20px;
        }
        @media (min-width: 1024px) {
            main { grid-template-columns: 1.2fr 0.8fr; }
        }

        .left-column, .right-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .prediction-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #canvas-container {
            width: 100%;
            aspect-ratio: 4/3;
            max-width: 640px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Loading Spinner */
        #loader {
            position: absolute;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #4ecca3;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chart-section {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 25px;
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .chart-section { grid-template-columns: 1fr 1fr; }
        }
        .chart-container {
            height: 250px;
            width: 100%;
        }

        .market-section {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            margin-bottom: 25px;
        }
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .market-grid::-webkit-scrollbar { width: 6px; }
        .market-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .market-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }
        .market-item:hover {
            background: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        .market-item.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            font-weight: bold;
        }
        .market-item span { display: block; font-size: 1.5rem; margin-bottom: 5px; }

        .recipe-section {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .recipe-card {
            display: none;
            animation: fadeIn 0.8s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .recipe-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
        }
        .recipe-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(78, 204, 163, 0.1);
            color: var(--primary);
            font-size: 0.8rem;
            margin-right: 8px;
            margin-bottom: 10px;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        button, .file-label {
            padding: 14px 28px;
            font-size: 0.9rem;
            border: none;
            border-radius: 16px;
            background: var(--primary);
            color: #0f172a;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover, .file-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(78, 204, 163, 0.2);
            filter: brightness(1.1);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
            color: #aaa;
        }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover {
            background: #2980b9;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover {
            background: #c0392b;
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4);
        }
        input[type="file"] {
            display: none;
        }
        .status-box {
            margin-top: 20px;
            padding: 15px 30px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            text-align: center;
            font-weight: 500;
        }

        #results-container {
            margin-top: 20px;
            width: 100%;
            display: grid;
            gap: 10px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .result-item.top {
            background: rgba(78, 204, 163, 0.1);
            border: 1px solid rgba(78, 204, 163, 0.2);
        }
        .result-name { font-weight: 600; color: #f8fafc; }
        .result-prob { font-family: 'Orbitron', monospace; color: var(--primary); }
        .recipe-content ul { padding-left: 20px; color: #cbd5e1; }
        
        .btn-youtube {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #ff0000;
            color: white !important;
            padding: 12px 20px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            font-size: 0.95rem;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }
        .btn-youtube:hover {
            background: #cc0000;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.4);
        }
        .btn-youtube svg { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="bg-fruits" id="bg-animation"></div>

    <header>
        <h1>AI Quality Classifier</h1>
        <p>AI 과일 품질 분석기 및 실시간 물가 정보</p>
    </header>

    <main>
        <div class="left-column">
            <section class="prediction-section">
                <div id="canvas-container">
                    <div id="loader"></div>
                </div>
                <div class="controls">
                    <button id="start-btn" onclick="startAnalysis()" disabled>
                        <span>📷</span> 분석 시작
                    </button>
                    <label for="image-input" class="file-label btn-secondary">
                        <span>📁</span> 사진 올리기
                    </label>
                    <input type="file" id="image-input" accept="image/*" onchange="handleImageUpload(event)">
                    <button onclick="resetAll()" class="btn-danger">
                        <span>🔄</span> 초기화
                    </button>
                </div>
                <div class="status-box" id="label-text">데이터 대기 중...</div>
                <div id="results-container"></div>
            </section>

            <section class="chart-section" id="price-section">
                <div class="chart-block">
                    <div class="recipe-title">
                        <span>📊</span> 지난 7일 기록 (단위: 원)
                    </div>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>
                <div class="chart-block">
                    <div class="recipe-title">
                        <span>🚀</span> 다음 1주 예측 (단위: 원)
                    </div>
                    <div class="chart-container">
                        <canvas id="forecastChart"></canvas>
                    </div>
                </div>
            </section>
        </div>

        <div class="right-column">
            <section class="market-section">
                <div class="recipe-title">
                    <span>🍎</span> 인기 과일 20종 시장가
                </div>
                <div class="market-grid" id="market-list">
                    <!-- Dynamic fruit buttons -->
                </div>
            </section>

            <aside class="recipe-section" id="recipe-container">
                <div class="recipe-title">
                    <span>🍳</span> 품질별 맞춤 레시피
                </div>
                <div id="recipe-content-area">
                    <div class="recipe-card" style="display: block; opacity: 0.5;">
                        <span class="recipe-tag">분석 대기</span>
                        <div class="recipe-content">
                            AI 분석을 시작하면 품질에 맞는 활용법을 알려드립니다.
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script>
        // Create floating background fruits
        const fruits = ['🍎', '🍎', '🍏', '🍏', '🍎', '✨', '🍃'];
        const bg = document.getElementById('bg-animation');
        for (let i = 0; i < 15; i++) {
            const fruit = document.createElement('div');
            fruit.className = 'bg-fruit';
            fruit.innerText = fruits[Math.floor(Math.random() * fruits.length)];
            fruit.style.left = Math.random() * 100 + 'vw';
            fruit.style.animationDelay = Math.random() * 20 + 's';
            fruit.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            bg.appendChild(fruit);
        }
    </script>
    <script src="sketch.js"></script>
</body>
</html>
